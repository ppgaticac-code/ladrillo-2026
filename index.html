<title>🧱 Ladrillo a Ladrillo — PPG 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#0d0f0b;color:#d4cdb8;font-family:'Arial Narrow',Arial,sans-serif;overscroll-behavior:none}
:root{--bg:#0d0f0b;--bgCard:#131710;--bgAlt:#0f110d;--border:#1e2419;--olive:#6b7c3f;--oliveL:#8fa055;--oliveDim:#3d4a22;--sand:#c8b882;--red:#c0392b;--green:#4a7c3f;--greenBright:#5cb85c;--text:#d4cdb8;--textDim:#7a7560;--textMuted:#3d3c30;--white:#e8e4d4;--blue:#4a7aaa;--purple:#8a6fb8}
button{font-family:inherit;cursor:pointer}
textarea{font-family:monospace;resize:none;outline:none}
#app{max-width:430px;margin:0 auto;min-height:100vh;padding-bottom:72px;position:relative}
#hdr{background:linear-gradient(180deg,#161a11 0%,var(--bg) 100%);padding:14px 16px 10px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50}
.hdr-row{display:flex;justify-content:space-between;align-items:center}
.brand{font-size:18px;font-weight:900;letter-spacing:.08em;color:var(--oliveL);text-transform:uppercase;line-height:1}
.brand-sub{font-size:9px;color:var(--textDim);font-weight:700;letter-spacing:.18em;text-transform:uppercase;margin-top:2px}
.week-badge{display:inline-block;padding:3px 9px;border-radius:2px;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;white-space:nowrap}
#tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--bgCard);border-top:1px solid var(--border);display:flex;z-index:100}
.tab-btn{flex:1;padding:10px 4px 12px;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--textMuted);font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;position:relative}
.tab-btn.active{color:var(--oliveL);font-weight:900}
.tab-btn.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;background:var(--olive);border-radius:1px}
.tab-icon{font-size:18px}
.content{padding:0 16px 16px}
.sec-title{font-size:10px;font-weight:900;color:var(--olive);text-transform:uppercase;letter-spacing:.2em;margin:18px 0 10px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);padding-bottom:6px}
.card{background:var(--bgCard);border-radius:4px;padding:14px 16px;border:1px solid var(--border);margin-bottom:10px}
.pbar{height:3px;background:var(--border);border-radius:1px;overflow:hidden;margin-top:8px}
.pfill{height:100%;border-radius:1px;transition:width .4s ease}
.sess-hdr{display:flex;align-items:center;gap:12px;border-radius:4px;padding:14px 16px;margin-bottom:10px;border-left-width:3px;border-left-style:solid}
.sess-emoji{font-size:26px}
.sess-name{font-size:19px;font-weight:900;text-transform:uppercase;letter-spacing:.04em;line-height:1.1}
.sess-meta{margin-top:6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.block-item{display:flex;align-items:flex-start;gap:10px;padding:11px 13px;border-radius:3px;margin-bottom:5px;border:1px solid var(--border);cursor:pointer;background:var(--bgCard)}
.block-item.done{background:rgba(143,160,85,.05)}
.checkbox{width:22px;height:22px;border-radius:2px;border:2px solid var(--textMuted);background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.checkbox.done{border-color:currentColor;background:currentColor}
.block-label{font-size:13px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;line-height:1.2;color:var(--textDim)}
.block-label.done{color:var(--text)}
.block-detail{font-size:11px;color:var(--textDim);margin-top:3px;line-height:1.6;font-family:monospace;white-space:pre-line}
.block-detail.done{color:var(--textMuted)}
.quote-card{background:linear-gradient(135deg,#181e10 0%,#111408 100%);border:1px solid var(--oliveDim);border-left:3px solid var(--olive);border-radius:4px;padding:14px 16px;margin:14px 0;position:relative}
.quote-text{font-style:italic;font-size:14px;font-weight:500;line-height:1.6;color:var(--sand)}
.quote-author{margin-top:8px;font-size:11px;color:var(--olive);font-weight:700;text-transform:uppercase;letter-spacing:.14em}
.quote-next{position:absolute;top:10px;right:12px;font-size:14px;color:var(--olive);cursor:pointer;opacity:.5;background:none;border:none}
.day-card{display:flex;align-items:center;gap:10px;padding:11px 13px;border-radius:3px;margin-bottom:5px;background:var(--bgCard);border:1px solid var(--border);border-left:3px solid transparent;cursor:pointer}
.day-card.today{background:#161e0e;border-color:rgba(107,124,63,.4);border-left-color:var(--olive)}
.day-card.done{background:var(--bgAlt);border-left-color:rgba(107,124,63,.3)}
.day-name{font-size:10px;font-weight:900;color:var(--textMuted);text-transform:uppercase;letter-spacing:.1em;width:26px;text-align:center;flex-shrink:0}
.day-name.today{color:var(--oliveL)}
.day-date{font-size:11px;font-weight:700;color:var(--textDim);flex-shrink:0;min-width:42px}
.day-date.today{color:var(--white)}
.day-expand{background:var(--bgAlt);border:1px solid var(--border);border-top:none;border-radius:0 0 4px 4px;padding:10px 12px;margin-bottom:5px;margin-top:-5px}
.note-input{width:100%;background:var(--bgCard);border:1px solid var(--border);border-radius:3px;padding:10px 12px;color:var(--text);font-size:13px;margin-top:10px}
.note-input:focus{border-color:var(--olive)}
.week-nav{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:12px}
.week-nav button{background:var(--bgCard);border:1px solid var(--border);color:var(--textDim);border-radius:3px;padding:6px 14px;font-size:13px;font-weight:700}
.week-nav button:disabled{opacity:.25}
.week-nav-center{text-align:center;flex:1}
.pr-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:3px;background:var(--bgCard);border:1px solid var(--border);margin-bottom:5px}
.ev-card{border-radius:4px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:14px;border-left-width:3px;border-left-style:solid}
.ev-days{font-size:32px;font-weight:900;line-height:1;min-width:50px;text-align:center;font-variant-numeric:tabular-nums}
.load-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.load-cell{background:var(--bgAlt);border-radius:3px;padding:7px 9px;border:1px solid var(--border)}
.load-cell-label{font-size:10px;color:var(--textMuted);text-transform:uppercase;letter-spacing:.06em;font-weight:700}
.load-cell-val{font-size:13px;font-weight:900;color:var(--oliveL);margin-top:2px}
.glos-row{display:flex;gap:10px;margin-bottom:7px;align-items:baseline}
.glos-term{font-size:11px;font-weight:900;color:var(--oliveL);min-width:78px;text-transform:uppercase;letter-spacing:.04em}
.glos-def{font-size:11px;color:var(--textDim);line-height:1.5}
.banner-done{background:#0a150a;border:1px solid rgba(74,124,63,.27);border-left:3px solid var(--greenBright);border-radius:4px;padding:14px 16px;text-align:center;margin-top:12px}
</style>
</head>

const LIFTS=[
  {key:"Sentadilla", re:/^Sentadilla barra$/},
  {key:"Peso Muerto", re:/^Peso muerto convencional$/},
  {key:"Press Banca", re:/^Press banca barra$/},
  {key:"Farmers carry", re:/^Farmers carry$/, fixed:15, unit:"Manc 15kg c/u"},
];
function weekFromDate(d){return Math.floor((d-PLAN_START)/(7*86400000))+4;}
function tryLift(prs,b,w,dk,src){
  LIFTS.forEach(function(L){
    if(L.re.test(b.label)){
      let kg=(L.fixed!=null)?L.fixed:null;
      if(kg==null){const m=String(b.detail||"").match(/(\d+)\s*kg/);if(m)kg=+m[1];}
      if(kg!=null&&(!prs[L.key]||kg>prs[L.key].kg||(kg===prs[L.key].kg&&src==="done"))){
        prs[L.key]={kg:kg,week:w,dateKey:dk,src:src,unit:L.unit||null};
      }
    }
  });
}
// PRs: el plan arrancó antes de hoy. Las semanas hasta la actual se asumen completadas →
// se precargan con el mayor peso del Plan Maestro. Las sesiones marcadas (incluso futuras) actualizan desde ahí.
function computePRs(){
  const prs={};const cw=getCurrentWeek();
  for(let w=4;w<=cw;w++){
    [2,3,5].forEach(function(dow){ // martes, miércoles, viernes = días de fuerza
      getSession(w,dow).blocks.forEach(function(b){tryLift(prs,b,w,null,"plan");});
    });
  }
  Object.keys(STORAGE.checks).forEach(function(dk){
    const d=parseLocalDate(dk);const w=weekFromDate(d);
    if(w<4||w>PLAN_WEEKS)return;
    const ck=STORAGE.checks[dk]||{};
    getSession(w,d.getDay()).blocks.forEach(function(b){if(ck[b.id])tryLift(prs,b,w,dk,"done");});
  });
  return prs;
}

    const isToday=dk===todK;const isPast=d<new Date()&&!isToday;const isExp=STATE.expandedDay===dk;
    html+='<div><div class="day-card'+(isToday?" today":"")+(pct===100?" done":"")+'" onclick="toggleExpand(\''+dk+'\')"><div class="day-name'+(isToday?" today":"")+'">'+DAY_NAMES[dow]+'</div><div class="day-date'+(isToday?" today":"")+'">'+d.getDate()+' '+MONTHS[d.getMonth()]+'</div><div style="flex:1"><div style="display:flex;align-items:center;gap:8px"><span style="font-size:14px">'+s.emoji+'</span><span style="font-size:12px;font-weight:700;color:'+(isToday?C.white:C.textDim)+';text-transform:uppercase;letter-spacing:.03em">'+s.name+'</span>'+(s.dur?'<span style="font-size:9px;color:'+C.textMuted+';font-family:monospace;margin-left:auto">⏱ '+s.dur+'</span>':"")+'</div>'+(((isToday||isPast)&&tot>1)?'<div style="margin-top:5px;display:flex;align-items:center;gap:8px"><div class="pbar" style="flex:1;margin-top:0"><div class="pfill" style="width:'+pct+'%;background:'+(pct===100?C.greenBright:s.color)+'"></div></div><span style="font-size:10px;color:'+(pct===100?C.greenBright:C.textMuted)+';font-weight:700;min-width:28px">'+pct+'%</span></div>':"")+'</div>'+(pct===100?'<span style="font-size:16px">🧱</span>':"")+((isToday&&pct<100)?'<span style="width:6px;height:6px;border-radius:50%;background:'+C.oliveL+';flex-shrink:0;display:inline-block"></span>':"")+'<span style="font-size:10px;color:'+C.textMuted+';margin-left:4px">'+(isExp?"▲":"▼")+'</span></div>'+
    (isExp?'<div class="day-expand">'+s.blocks.map(function(b){const bd=!!c[b.id];return '<div style="display:flex;align-items:flex-start;gap:9px;margin-bottom:7px" onclick="toggleCheck(\''+dk+'\',\''+b.id+'\')"><div class="checkbox'+(bd?" done":"")+'" style="width:18px;height:18px;margin-top:1px;color:'+s.color+'">'+(bd?checkSVG(10):"")+'</div><div style="flex:1;min-width:0"><div style="font-size:11px;font-weight:700;color:'+(bd?C.text:s.color)+';text-transform:uppercase;letter-spacing:.05em">'+escHtml(b.label)+'</div>'+(b.detail?'<div style="font-size:11px;color:'+C.textDim+';font-family:monospace;line-height:1.5;margin-top:2px;white-space:pre-line">'+escHtml(b.detail)+'</div>':"")+'</div></div>';}).join("")+'<div style="margin-top:8px"><div style="font-size:9px;color:'+C.olive+';font-weight:700;text-transform:uppercase;letter-spacing:.14em;margin-bottom:4px">📋 Nota</div><textarea class="note-input" rows="2" placeholder="Sensaciones, ajustes..." oninput="schedNote(this.value,\''+dk+'\')" style="margin-top:0">'+escHtml(STORAGE.notes[dk]||"")+'</textarea></div></div>':"")+'</div>';
  });
  document.getElementById("tab-semana").innerHTML=html;
}
function renderMetas(){
  const cw=getCurrentWeek();const W=WEEKS[cw];const col=W?WEEK_COLORS[W.t]:C.olive;
  const macropct=Math.max(0,Math.min(100,Math.round((cw-4)/(PLAN_WEEKS-4)*100)));
  let html='<div class="sec-title">🗓 Macrociclo 2026</div><div class="card"><div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px"><div><span style="font-size:30px;font-weight:900;color:'+C.oliveL+';line-height:1">S'+cw+'</span><span style="font-size:12px;color:'+C.textMuted+';margin-left:6px">de '+PLAN_WEEKS+'</span></div><div style="text-align:right"><div style="font-size:16px;font-weight:900;color:'+C.white+'">'+macropct+'%</div><div style="font-size:9px;color:'+C.textMuted+';text-transform:uppercase;letter-spacing:.12em">completado</div></div></div><div class="pbar"><div class="pfill" style="width:'+macropct+'%;background:'+C.olive+'"></div></div><div style="margin-top:8px;display:flex;justify-content:space-between"><span style="font-size:10px;color:'+C.textMuted+';font-family:monospace">18 May 2026</span><span style="font-size:10px;color:'+C.textMuted+';font-family:monospace">25 Oct 2026</span></div></div>';
  if(W&&W.mar){
    html+='<div class="card" style="border-color:'+col+'44"><div style="font-size:9px;color:'+C.textMuted+';text-transform:uppercase;letter-spacing:.18em;font-weight:700;margin-bottom:8px">Cargas clave · S'+cw+' ('+W.lbl+')</div><div class="load-grid">'+W.mar.map(function(r){return '<div class="load-cell"><div class="load-cell-label">'+escHtml(r[0])+'</div><div class="load-cell-val">'+escHtml(r[2]||"—")+'</div></div>';}).join("")+'</div></div>';
  }
  html+='<div class="card" style="border-color:'+C.oliveDim+';padding:10px 14px"><div style="font-size:10px;color:'+C.olive+';font-weight:700;text-transform:uppercase;letter-spacing:.12em;margin-bottom:4px">🏋 Equipo · el Búnker</div><div style="font-size:11px;color:'+C.textDim+';line-height:1.6">Barra olímpica 20kg + discos 4×10 / 4×5 / 2×2.5 / 2×1 (cargas armables hasta 87kg). Mancuernas 2.5/5/10/15kg. KB 14kg ×2 · KB 16kg ×1. Slam ball 6kg (wall ball overhead, nunca al suelo). Bici spinning · TRX · bandas · trotadora.</div></div>';
  const prs=computePRs();
  html+='<div class="sec-title">🏆 Registros personales</div><div class="card">'+LIFTS.map(function(L){const pr=prs[L.key];if(pr){const ref=pr.src==="done"?("marcado S"+pr.week+" · "+shortDate(pr.dateKey)):("según plan · S"+pr.week);return '<div class="pr-row"><div><div style="font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:'+C.text+'">'+L.key+'</div><div style="font-size:10px;color:'+C.textMuted+';margin-top:1px;font-family:monospace">'+ref+(pr.unit?" · "+pr.unit:"")+'</div></div><div style="text-align:right"><div style="font-size:22px;font-weight:900;color:'+C.oliveL+';line-height:1">'+pr.kg+'</div><div style="font-size:10px;color:'+C.textMuted+'">kg</div></div></div>';}else{return '<div class="pr-row" style="opacity:.55"><div><div style="font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:'+C.textDim+'">'+L.key+'</div><div style="font-size:10px;color:'+C.textMuted+';margin-top:1px;font-style:italic">sin registro aún</div></div><div style="text-align:right"><div style="font-size:22px;font-weight:900;color:'+C.textMuted+';line-height:1">—</div></div></div>';}}).join("")+'<div style="font-size:10px;color:'+C.textMuted+';margin-top:6px;font-style:italic">Precargados con tu progreso del plan hasta hoy · se actualizan solos al marcar sesiones de fuerza completadas (el mayor peso manda)</div></div>';
  html+='<div class="sec-title">🏁 Objetivos</div>'+RACES.map(function(ev){const days=getDaysUntil(ev.date);const passed=days<0;const c=passed?C.textMuted:ev.color;return '<div class="ev-card" style="background:'+c+'0a;border-color:'+c+'30;border-left-color:'+c+'"><div style="text-align:center;min-width:50px"><div class="ev-days" style="color:'+c+'">'+(passed?"✓":days)+'</div><div style="font-size:9px;color:'+C.textMuted+';font-weight:700;letter-spacing:.14em;text-transform:uppercase">'+(passed?"listo":"días")+'</div></div><div style="flex:1"><div style="font-size:16px;margin-bottom:3px">'+ev.emoji+'</div><div style="font-size:15px;font-weight:900;text-transform:uppercase;letter-spacing:.05em;color:'+(passed?C.textMuted:C.white)+'">'+ev.name+'</div><div style="font-size:11px;color:'+C.textDim+';margin-top:2px;font-family:monospace">'+fmtDate(ev.date)+' · '+ev.tag+'</div>'+((!passed&&days<=14)?'<div style="margin-top:5px;font-size:10px;color:'+ev.color+';font-weight:700;text-transform:uppercase;letter-spacing:.12em">⚠ INMINENTE</div>':"")+'</div></div>';}).join("");
  html+='<div class="sec-title">📖 Glosario</div><div class="card">'+[
    ["Z1 / Z2","Zona 1: FC <130, regenerativo · Zona 2: FC 130-150, base aeróbica, ritmo conversable"],
    ["FC","Frecuencia cardíaca (ppm)"],
    ["AMRAP","As Many Rounds As Possible — máximas rondas en el tiempo dado"],
    ["EMOM","Every Minute On the Minute — cada ejercicio arranca al inicio de cada minuto"],
    ["Biserie","Dos ejercicios seguidos sin pausa entre ellos (superserie)"],
    ["Goblet","Sentadilla sosteniendo una pesa (KB o mancuerna) al pecho"],
    ["Wall ball","Slam ball 6kg: sentadilla profunda + empuje overhead. En el Búnker NUNCA toca el suelo"],
    ["HYROX","8 estaciones funcionales + 1 km de carrera entre cada una"],
    ["Compromised run","Correr inmediatamente después de estaciones, para simular la fatiga de carrera"],
    ["Strides","Aceleraciones cortas (10-15s) al ~85% para activar piernas, no para cansar"],
    ["Taper","Bajar volumen pre-carrera manteniendo algo de intensidad"],
    ["Descarga","Semana de -30% para recuperar y supercompensar"],
  ].map(function(g){return '<div class="glos-row"><span class="glos-term">'+g[0]+'</span><span class="glos-def">'+g[1]+'</span></div>';}).join("")+'</div>';
  html+='<div class="card" style="text-align:center;margin-top:4px;border-color:'+C.oliveDim+'"><div style="font-size:28px;margin-bottom:6px">🧱</div><div style="font-size:12px;color:'+C.textDim+';line-height:1.7;font-style:italic">"Ladrillo a ladrillo,<br>se construye la muralla."</div></div>';
  document.getElementById("tab-metas").innerHTML=html;
}
function switchTab(t){STATE.tab=t;if(t==="semana")STATE.weekOffset=0;STATE.expandedDay=null;render();}
function changeWeek(delta){const cw=getCurrentWeek();const nv=cw+STATE.weekOffset+delta;if(nv<4||nv>PLAN_WEEKS)return;STATE.weekOffset+=delta;STATE.expandedDay=null;render();}
function toggleExpand(dk){STATE.expandedDay=STATE.expandedDay===dk?null:dk;render();}
function nextQuote(){STATE.quoteIdx=(STATE.quoteIdx+1)%QUOTES.length;render();}
loadStorage();
render();
</script>
</body>
</html>
